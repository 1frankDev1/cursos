<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduApp - Aprende y Domina</title>
    <!-- Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header class="app-header">
            <div id="back-button" class="hidden">
                <span class="material-icons">arrow_back</span>
            </div>
            <h1 id="page-title">Cursos</h1>
        </header>

        <!-- Main Content Area -->
        <main id="main-content">
            <!-- Content will be injected here by app.js -->
        </main>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <div class="nav-item active" data-view="home">
                <span class="material-icons">home</span>
                <span>Inicio</span>
            </div>
            <div class="nav-item" data-view="courses">
                <span class="material-icons">school</span>
                <span>Cursos</span>
            </div>
            <div class="nav-item" data-view="profile">
                <span class="material-icons">person</span>
                <span>Perfil</span>
            </div>
        </nav>
    </div>

    <!-- Scripts -->
    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
